name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: DB smoke test (import app & create tables)
      run: |
        python - <<'PY'
from app import app, db
with app.app_context():
    db.create_all()
print('DB OK')
PY

    - name: Lint (optional)
      run: |
        echo "Skipping lint (add tools like flake8 or ruff to requirements for linting)"
